site_name: 果链工程师 (Guolian Engineer)
site_url: https://www.guoliangongchengshi.com
site_description: Apple Supply Chain Engineering Knowledge Base
site_author: Chris Chen

repo_name: guolianengineer/guolianengineer.github.io
repo_url: https://github.com/guolianengineer/guolianengineer.github.io
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - NPI 开发指南: 01_NPI_Guide/index.md
  - 图纸与公差: 02_GD_T/index.md
  - 制造技术: 
      - 概览: 03_Manufacturing/index.md
      - "Part I: Materials": 
          - 概览: 03_Manufacturing/Part_I_Materials/index.md
          - "Ch. 1 Structure of Metals": 03_Manufacturing/Part_I_Materials/Chapter_01_Structure_of_Metals/index.md
          - "Ch. 2 Mechanical Behavior": 03_Manufacturing/Part_I_Materials/Chapter_02_Mechanical_Behavior/index.md
          - "Ch. 3 Physical Properties": 03_Manufacturing/Part_I_Materials/Chapter_03_Physical_Properties/index.md
          - "Ch. 4 Metal Alloys": 03_Manufacturing/Part_I_Materials/Chapter_04_Metal_Alloys/index.md
          - "Ch. 5 Ferrous Metals": 03_Manufacturing/Part_I_Materials/Chapter_05_Ferrous_Metals/index.md
          - "Ch. 6 Nonferrous Metals": 03_Manufacturing/Part_I_Materials/Chapter_06_Nonferrous_Metals/index.md
          - "Ch. 7 Polymers": 03_Manufacturing/Part_I_Materials/Chapter_07_Polymers/index.md
          - "Ch. 8 Ceramics": 03_Manufacturing/Part_I_Materials/Chapter_08_Ceramics/index.md
          - "Ch. 9 Composites": 03_Manufacturing/Part_I_Materials/Chapter_09_Composites/index.md
      - "Part II: Casting":
