site_name: 果链工程师 (Guolian Engineer)
site_url: https://www.guoliangongchengshi.com
site_description: Apple Supply Chain Engineering Knowledge Base
site_author: 果链工程师

repo_name: guolianengineer/guolianengineer.github.io
repo_url: https://github.com/guolianengineer/guolianengineer.github.io
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2024 - 2026 果链工程师

theme:
  name: material
  language: zh
  logo: assets/images/site_logo.png
  favicon: assets/images/site_logo.png
  
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - header.autohide

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/guolianengineer
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/your-profile
    - icon: material/email
      link: mailto:your-email@example.com

extra_css:
  - assets/css/extra.css

plugins:
  - search
  - awesome-pages
  - blog:
      post_dir: blog/posts
      archive_url: blog/archive
      categories_url: blog/categories
      tags_url: blog/tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

